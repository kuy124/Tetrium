<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pro Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #050505;
            --surface: rgba(20, 24, 32, 0.7);
            --surface-hover: rgba(30, 36, 48, 0.9);
            --border: #2A3143;
            --text-main: #F8FAFC;
            --text-muted: #64748B;
            
            --primary: #6366F1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #EC4899;
            --danger: #EF4444;
            --danger-glow: rgba(239, 68, 68, 0.5);
            --success: #10B981;
            --warning: #F59E0B;
        }

        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base);
            /* Animated Cyber Grid Background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridScroll 15s linear infinite;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        @keyframes gridScroll {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* Ambient Glow Behind Everything */
        body::before {
            content: '';
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60vw; height: 60vh;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%);
            opacity: 0.3; z-index: -1; filter: blur(100px);
        }

        h1, h2, h3 { margin: 0; }

        /* --- SCREENS --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s ease-out;
            z-index: 10;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- MENU & LOBBY UI --- */
        .panel {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,1), 0 0 20px var(--primary-glow);
        }

        .title { 
            font-size: 42px; font-weight: 900; margin-bottom: 32px; letter-spacing: -2px;
            display: flex; justify-content: center; gap: 4px; text-transform: uppercase;
        }
        .title span { text-shadow: 0 0 10px currentColor; }
        .title span:nth-child(1) { color: #EF4444; } /* Z */
        .title span:nth-child(2) { color: #F97316; } /* L */
        .title span:nth-child(3) { color: #FACC15; } /* O */
        .title span:nth-child(4) { color: #10B981; } /* S */
        .title span:nth-child(5) { color: #06B6D4; } /* I */
        .title span:nth-child(6) { color: #6366F1; } /* J */
        .title-pro { 
            background: linear-gradient(135deg, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-left: 12px; font-style: italic; 
        }

        input {
            width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); font-size: 16px; font-weight: 600;
            border-radius: 12px; margin-bottom: 16px; font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s; text-align: center; letter-spacing: 2px;
        }
        input:focus { 
            outline: none; border-color: var(--primary); 
            box-shadow: 0 0 15px var(--primary-glow), inset 0 0 10px rgba(0,0,0,0.5); 
            background: rgba(0,0,0,0.6);
        }

        /* Stylized Esports Button */
        button {
            position: relative; width: 100%; padding: 16px; font-size: 16px; font-weight: 800; color: white;
            background: var(--primary); border: none; cursor: pointer; margin-bottom: 12px; 
            text-transform: uppercase; letter-spacing: 2px;
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%);
            transition: all 0.2s ease-in-out;
        }
        button::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        button:hover { background: #4F46E5; transform: scale(1.02); box-shadow: 0 0 20px var(--primary-glow); }
        button:hover::before { left: 150%; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #334155; opacity: 0.6; cursor: not-allowed; clip-path: none; border-radius: 8px;}

        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #DC2626; box-shadow: 0 0 20px var(--danger-glow); }

        .divider { display: flex; align-items: center; margin: 24px 0; color: var(--text-muted); font-size: 12px; text-transform: uppercase; font-weight: 700; letter-spacing: 2px;}
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0 16px; }

        #error-msg { 
            background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger);
            color: #FCA5A5; font-size: 14px; padding: 12px; border-radius: 8px; 
            margin-bottom: 20px; display: none; font-weight: 600; text-shadow: 0 0 5px var(--danger);
        }
        
        .code-display { font-size: 48px; font-weight: 900; font-family: 'JetBrains Mono', monospace; letter-spacing: 12px; color: var(--primary); margin: 16px 0; text-shadow: 0 0 30px var(--primary-glow); }

        .player-list { 
            text-align: left; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 12px; max-height: 200px; overflow-y: auto; margin-bottom: 24px; 
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
        }
        .player-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; font-weight: 600; display: flex; align-items: center; }
        .player-item::before { content: ''; width: 10px; height: 10px; background: var(--success); border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px var(--success); }
        .player-item:last-child { border-bottom: none; }

        /* --- GAME UI --- */
        #game-layout { display: flex; flex-direction: row; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 24px; gap: 40px; }

        /* Opponents Section */
        #opponents-area { display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 20px; width: 340px; height: 100%; overflow-y: auto; }

        .opponent-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center; width: fit-content; box-shadow: 0 15px 30px rgba(0,0,0,0.6); position: relative; }
        .opponent-name { font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 1px;}
        .opponent-canvas-wrapper { position: relative; background: #000; border: 2px solid var(--border); border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .opponent-canvas { display: block; }
        .opponent-score { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--primary); font-weight: 800; margin-top: 10px; text-shadow: 0 0 10px var(--primary-glow);}
        .opponent-status { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); color: var(--danger); font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 24px; display: none; text-shadow: 0 0 15px var(--danger); }

        /* Main Player Section */
        #my-area { display: flex; justify-content: center; align-items: flex-start; gap: 24px; position: relative; }

        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .info-box { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.6); min-width: 120px; backdrop-filter: blur(10px); }
        .info-title { font-size: 12px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .info-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 800; color: var(--primary); text-shadow: 0 0 15px var(--primary-glow);}
        
        .main-canvas-container { position: relative; background: rgba(0,0,0,0.8); border: 4px solid var(--border); border-radius: 12px; padding: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 30px rgba(99, 102, 241, 0.1); transition: border-color 0.3s;}
        canvas { display: block; }

        .game-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 8px; z-index: 20;
            backdrop-filter: blur(5px);
        }
        .overlay-text { font-size: 40px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; text-align: center; padding: 0 10px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .text-danger { color: #EF4444; text-shadow: 0 0 30px var(--danger-glow), 0 0 10px #EF4444; }
        .text-success { color: #10B981; text-shadow: 0 0 30px rgba(16, 185, 129, 0.5), 0 0 10px #10B981; }
        .overlay-sub { font-size: 16px; color: var(--text-main); margin-top: 16px; margin-bottom: 32px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }

        #attack-alert {
            position: absolute; top: 20%; left: -80px; color: var(--warning); font-weight: 900; font-size: 28px; 
            text-shadow: 0 0 20px var(--warning); opacity: 0; transition: opacity 0.2s, transform 0.2s;
            transform: translateX(-20px) rotate(-10deg);
        }
        #attack-alert.active { opacity: 1; transform: translateX(0) rotate(-10deg); }

        @media (max-width: 900px) {
            #game-layout { flex-direction: column-reverse; padding: 16px; gap: 20px;}
            #opponents-area { width: 100%; flex-direction: row; height: auto; }
            #my-area { transform: scale(0.9); }
        }
    </style>
</head>
<body>

    <!-- 1. SETUP SCREEN -->
    <div id="screen-setup" class="screen active">
        <div class="panel">
            <div class="title">
                <span>T</span><span>E</span><span>T</span><span>R</span><span>I</span><span>S</span><span class="title-pro">PRO</span>
            </div>
            <div id="error-msg"></div>
            <input type="text" id="username" placeholder="ENTER YOUR GAMERTAG" maxlength="12">
            <button onclick="createRoom()">Host Match</button>
            <div class="divider">OR</div>
            <input type="text" id="join-code" placeholder="ENTER 5-DIGIT CODE" maxlength="5">
            <button class="btn-secondary" onclick="joinRoom()">Join Match</button>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="screen-lobby" class="screen">
        <div class="panel">
            <div class="title" style="font-size: 32px; color: white;">MATCH LOBBY</div>
            <div id="lobby-code-area" style="display:none; margin-bottom: 24px;">
                <div style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 2px;">Room Code</div>
                <div class="code-display" id="lobby-code">-----</div>
            </div>
            <div style="font-size: 14px; color: var(--text-muted); text-align: left; margin-bottom: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Players Connected</div>
            <div class="player-list" id="player-list"></div>
            <div id="lobby-status" style="font-size: 16px; color: var(--primary); margin-bottom: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1.5s infinite;">Waiting for host...</div>
            <button id="btn-start" onclick="startGameAsHost()" style="display:none; margin-top: 10px;">Start Match</button>
        </div>
    </div>
    
    <style>@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }</style>

    <!-- 3. GAME SCREEN -->
    <div id="screen-game" class="screen">
        <div id="game-layout">
            <div id="opponents-area"></div>

            <div id="my-area">
                <div class="side-panel">
                    <div class="info-box">
                        <div class="info-title">Hold (C)</div>
                        <canvas id="canvas-hold"></canvas>
                    </div>
                    <div class="info-box">
                        <div class="info-title">Score</div>
                        <div class="info-value" id="my-score">0</div>
                    </div>
                </div>

                <div class="main-canvas-container" id="main-container">
                    <canvas id="canvas-main"></canvas>
                    <div id="attack-alert">ATTACK!</div>
                    
                    <div id="game-overlay" class="game-overlay">
                        <div id="overlay-msg" class="overlay-text text-danger">GAME OVER</div>
                        <div id="overlay-sub" class="overlay-sub">SPECTATING OPPONENTS</div>
                        
                        <!-- Shown to Host to replay -->
                        <button id="btn-return-lobby" class="btn-danger" onclick="backToLobbyAsHost()" style="display:none; width: 80%; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%);">Return to Lobby</button>
                        <!-- Shown to Clients to wait -->
                        <div id="waiting-host-msg" style="display:none; font-size: 14px; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; animation: pulse 1.5s infinite;">Waiting for Host...</div>
                    </div>
                </div>

                <div class="side-panel">
                    <div class="info-box">
                        <div class="info-title">Next</div>
                        <canvas id="canvas-next"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // UI & DPI HELPERS
        // ==========================================
        let myName = "";
        let myPeerId = "";
        let isHost = false;
        
        const showError = (msg) => {
            const err = document.getElementById('error-msg');
            err.innerText = msg; err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 4000);
        }

        const switchScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setupHiDPICanvas(canvas, w, h, scale) {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = w * dpr; canvas.height = h * dpr;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr * scale, dpr * scale);
            return ctx;
        }

        // ==========================================
        // NETWORKING LOGIC
        // ==========================================
        let peer;
        let hostConnection; 
        let peerConnections = {}; 
        let playersData = {}; // { id: { name, score, arena, activePiece, status } }

        function initPeer(id, onOpen) {
            peer = new Peer(id);
            peer.on('open', onOpen);
            peer.on('error', err => {
                showError("Connection error. Ensure code is correct.");
                switchScreen('screen-setup');
            });
        }

        function createRoom() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return showError("Enter a GamerTag");

            const roomId = Math.floor(10000 + Math.random() * 90000).toString();
            isHost = true;
            
            initPeer(roomId, (id) => {
                myPeerId = id;
                playersData[myPeerId] = { name: myName, score: 0, status: 'lobby' };
                
                document.getElementById('lobby-code').innerText = id;
                document.getElementById('lobby-code-area').style.display = 'block';
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('lobby-status').style.display = 'none';
                
                updateLobbyUI(); switchScreen('screen-lobby');

                peer.on('connection', conn => {
                    conn.on('open', () => {
                        const peerName = conn.metadata.name;
                        if(Object.values(playersData).some(p => p.name.toLowerCase() === peerName.toLowerCase())) {
                            conn.send({ type: 'rejected', reason: 'Name is taken.' });
                            setTimeout(() => conn.close(), 500); return;
                        }

                        peerConnections[conn.peer] = conn;
                        playersData[conn.peer] = { name: peerName, score: 0, status: 'lobby' };
                        conn.send({ type: 'accepted', myId: conn.peer });
                        broadcastLobby();

                        conn.on('data', data => handleHostData(conn.peer, data));
                        conn.on('close', () => {
                            delete peerConnections[conn.peer]; delete playersData[conn.peer];
                            broadcastLobby(); checkWinCondition();
                        });
                    });
                });
            });
        }

        function handleHostData(peerId, data) {
            if(data.type === 'state_update') {
                playersData[peerId].arena = data.arena;
                playersData[peerId].activePiece = data.activePiece;
                playersData[peerId].score = data.score;
                playersData[peerId].status = data.status;
                broadcastGameState();
                checkWinCondition();
            }
            else if(data.type === 'attack') {
                routeAttack(peerId, data.lines);
            }
        }

        function broadcastLobby() {
            const list = Object.keys(playersData).map(id => ({ id, name: playersData[id].name }));
            Object.values(peerConnections).forEach(c => c.send({ type: 'lobby_update', players: list }));
            updateLobbyUI();
        }

        function broadcastGameState() {
            // FIX: Broadcast the entire playersData dictionary so everyone sees everyone (including host)
            Object.values(peerConnections).forEach(c => c.send({ type: 'game_sync', state: playersData }));
            renderOpponents(playersData);
        }

        function routeAttack(senderId, lines) {
            let aliveIds = Object.keys(playersData).filter(id => id !== senderId && playersData[id].status === 'playing');
            if(aliveIds.length === 0) return;
            
            let targetId = aliveIds[Math.floor(Math.random() * aliveIds.length)];
            
            if(targetId === myPeerId) {
                receiveGarbage(lines);
            } else {
                peerConnections[targetId].send({ type: 'receive_garbage', lines });
            }
        }

        function joinRoom() {
            myName = document.getElementById('username').value.trim();
            const code = document.getElementById('join-code').value.trim();
            if(!myName) return showError("Enter a GamerTag");
            if(code.length !== 5) return showError("Invalid 5-digit code");

            initPeer(null, () => {
                hostConnection = peer.connect(code, { metadata: { name: myName } });
                hostConnection.on('open', () => {
                    hostConnection.on('data', data => {
                        if(data.type === 'rejected') { showError(data.reason); peer.destroy(); }
                        else if(data.type === 'accepted') { myPeerId = data.myId; switchScreen('screen-lobby'); }
                        else if(data.type === 'lobby_update') {
                            playersData = {}; data.players.forEach(p => playersData[p.id] = p); updateLobbyUI();
                        }
                        else if(data.type === 'start_game') { setupOpponentCanvases(); switchScreen('screen-game'); startGameEngine(); }
                        else if(data.type === 'game_sync') { renderOpponents(data.state); }
                        else if(data.type === 'receive_garbage') { receiveGarbage(data.lines); }
                        else if(data.type === 'match_end') { showMatchEnd(data.winner); }
                        else if(data.type === 'back_to_lobby') { resetToLobby(); }
                    });
                    hostConnection.on('close', () => { alert("Host disconnected."); location.reload(); });
                });
            });
        }

        function updateLobbyUI() {
            const list = document.getElementById('player-list'); list.innerHTML = '';
            Object.values(playersData).forEach(p => {
                const el = document.createElement('div'); el.className = 'player-item';
                el.innerText = p.name + (p.name === myName ? ' (You)' : ''); list.appendChild(el);
            });
        }

        // ==========================================
        // GAME FLOW & LOBBY RESET LOGIC
        // ==========================================
        function startGameAsHost() {
            for(let id in playersData) playersData[id].status = 'playing'; // Prevent instant win bug
            Object.values(peerConnections).forEach(c => c.send({ type: 'start_game' }));
            setupOpponentCanvases(); switchScreen('screen-game'); startGameEngine();
        }

        function backToLobbyAsHost() {
            Object.values(peerConnections).forEach(c => c.send({ type: 'back_to_lobby' }));
            resetToLobby();
        }

        function resetToLobby() {
            gameRunning = false;
            gameStartedFlag = false;
            localStatus = 'lobby';
            arena = createMatrix(COLS, ROWS);
            player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
            document.getElementById('my-score').innerText = '0';
            document.getElementById('main-container').style.borderColor = "var(--border)";
            
            // hide overlays
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('btn-return-lobby').style.display = 'none';
            document.getElementById('waiting-host-msg').style.display = 'none';
            
            // clear opponents
            document.getElementById('opponents-area').innerHTML = '';
            for (let prop in opponentCtxs) { if (opponentCtxs.hasOwnProperty(prop)) delete opponentCtxs[prop]; }
            
            // reset players state
            for(let id in playersData) {
                playersData[id].status = 'lobby';
                playersData[id].score = 0;
                playersData[id].arena = null;
                playersData[id].activePiece = null;
            }
            
            updateLobbyUI();
            switchScreen('screen-lobby');
        }

        function syncLocalState(customStatus = 'playing') {
            const activePiece = player.matrix ? { matrix: player.matrix, pos: player.pos } : null;

            if(isHost) {
                playersData[myPeerId] = { ...playersData[myPeerId], arena, activePiece, score: player.score, status: customStatus };
                broadcastGameState();
                checkWinCondition();
            } else {
                hostConnection.send({ type: 'state_update', arena, activePiece, score: player.score, status: customStatus });
            }
        }

        function sendAttack(lines) {
            if(isHost) routeAttack(myPeerId, lines);
            else hostConnection.send({ type: 'attack', lines });
        }

        function checkWinCondition() {
            if(!isHost || !gameStartedFlag) return;
            const activePlayers = Object.values(playersData).filter(p => p.status === 'playing');
            const totalPlayers = Object.keys(playersData).length;
            
            // Win condition triggers if 1 player left (in multiplayer) or 0 left (if solo)
            if((totalPlayers > 1 && activePlayers.length <= 1) || (totalPlayers === 1 && activePlayers.length === 0)) {
                let winner = activePlayers.length === 1 ? activePlayers[0].name : "NOBODY";
                Object.values(peerConnections).forEach(c => c.send({ type: 'match_end', winner }));
                showMatchEnd(winner);
            }
        }

        // ==========================================
        // OPPONENT RENDERING
        // ==========================================
        const opponentCtxs = {};

        function setupOpponentCanvases() {
            const container = document.getElementById('opponents-area'); container.innerHTML = '';
            for(let id in playersData) {
                if(id === myPeerId) continue;
                
                const card = document.createElement('div'); card.className = 'opponent-card';
                const nameLabel = document.createElement('div'); nameLabel.className = 'opponent-name'; nameLabel.innerText = playersData[id].name;
                
                const wrapper = document.createElement('div'); wrapper.className = 'opponent-canvas-wrapper';
                const canvas = document.createElement('canvas'); canvas.className = 'opponent-canvas';
                
                const statusOverlay = document.createElement('div');
                statusOverlay.className = 'opponent-status';
                statusOverlay.id = `status-${id}`;
                statusOverlay.innerText = "K.O.";

                wrapper.appendChild(canvas);
                wrapper.appendChild(statusOverlay);
                
                const scoreLabel = document.createElement('div'); scoreLabel.className = 'opponent-score';
                scoreLabel.id = `score-${id}`; scoreLabel.innerText = '0';

                card.appendChild(nameLabel); card.appendChild(wrapper); card.appendChild(scoreLabel); container.appendChild(card);
                opponentCtxs[id] = setupHiDPICanvas(canvas, 100, 200, 10);
            }
        }

        function renderOpponents(states) {
            for(let id in states) {
                if(id === myPeerId) continue; // Skip rendering ourselves in the opponent grid
                const ctx = opponentCtxs[id]; if(!ctx) continue;
                
                ctx.clearRect(0, 0, COLS, ROWS);
                
                // Draw Locked Board
                if(states[id].arena) drawMatrix(states[id].arena, {x:0, y:0}, ctx);
                
                // Draw Active Piece
                if(states[id].activePiece && states[id].status === 'playing') {
                    drawMatrix(states[id].activePiece.matrix, states[id].activePiece.pos, ctx);
                }
                
                // KO Visual
                const statusEl = document.getElementById(`status-${id}`);
                if(statusEl) statusEl.style.display = states[id].status === 'game_over' ? 'flex' : 'none';
                
                const scoreEl = document.getElementById(`score-${id}`);
                if(scoreEl) scoreEl.innerText = states[id].score;
            }
        }

        // ==========================================
        // TETRIS ENGINE & VISUALS
        // ==========================================
        const COLS = 10, ROWS = 20, BLOCK_SIZE = 24;
        
        const ctxMain = setupHiDPICanvas(document.getElementById('canvas-main'), 240, 480, 24);
        const ctxHold = setupHiDPICanvas(document.getElementById('canvas-hold'), 80, 80, 20);
        const ctxNext = setupHiDPICanvas(document.getElementById('canvas-next'), 80, 80, 20);

        const colors = [ null, '#EF4444', '#F97316', '#FACC15', '#6366F1', '#06B6D4', '#10B981', '#A855F7', '#475569' ]; // 8 is Garbage

        const pieces = {
            'Z': [[1,1,0],[0,1,1],[0,0,0]], 'L': [[0,0,2],[2,2,2],[0,0,0]], 'O': [[3,3],[3,3]],
            'J': [[4,0,0],[4,4,4],[0,0,0]], 'I': [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]],
            'S': [[0,6,6],[6,6,0],[0,0,0]], 'T': [[0,7,0],[7,7,7],[0,0,0]]
        };

        function createMatrix(w, h) { return Array.from({length: h}, () => new Array(w).fill(0)); }

        let arena = createMatrix(COLS, ROWS);
        let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let bag = [], nextPiece = null, holdPiece = null, canHold = true;
        let gameRunning = false, gameStartedFlag = false, localStatus = 'playing';

        let dropInterval = 1000, lockDelayLimit = 500, lockTimer = 0, isLocking = false;
        const keys = { left: false, right: false, down: false };
        let dasTimer = 0; const DAS = 150, ARR = 40;  

        function getBagPiece() {
            if(bag.length === 0) { bag = ['I','J','L','O','S','T','Z']; bag.sort(() => Math.random() - 0.5); }
            return pieces[bag.pop()];
        }

        function showMatchEndOptions() {
            if(isHost) {
                document.getElementById('btn-return-lobby').style.display = 'block';
            } else {
                document.getElementById('waiting-host-msg').style.display = 'block';
            }
        }

        function triggerGameOver() {
            if(!gameRunning) return;
            gameRunning = false; localStatus = 'game_over';
            syncLocalState('game_over');
            
            document.getElementById('main-container').style.borderColor = "var(--danger)";
            const overlay = document.getElementById('game-overlay');
            const msg = document.getElementById('overlay-msg');
            msg.innerText = "K.O.";
            msg.className = "overlay-text text-danger";
            document.getElementById('overlay-sub').innerText = "SPECTATING OPPONENTS";
            
            // If playing solo, instantly show match end options
            if(Object.keys(playersData).length === 1) showMatchEndOptions();
            
            overlay.style.display = 'flex';
            renderLocal(); // Final draw
        }

        function showMatchEnd(winnerName) {
            gameRunning = false;
            localStatus = 'game_over'; // Ensures rendering stops processing input
            const overlay = document.getElementById('game-overlay');
            const msg = document.getElementById('overlay-msg');
            const sub = document.getElementById('overlay-sub');
            
            if(winnerName === myName) {
                document.getElementById('main-container').style.borderColor = "var(--success)";
                msg.innerText = "VICTORY";
                msg.className = "overlay-text text-success";
                sub.innerText = "YOU ARE THE CHAMPION";
            } else {
                document.getElementById('main-container').style.borderColor = "var(--danger)";
                msg.innerText = "MATCH OVER";
                msg.className = "overlay-text text-danger";
                sub.innerText = `WINNER: ${winnerName}`;
            }
            
            showMatchEndOptions();
            overlay.style.display = 'flex';
        }

        function resetPlayer() {
            if(!nextPiece) nextPiece = getBagPiece();
            player.matrix = nextPiece; nextPiece = getBagPiece();
            player.pos.y = 0; player.pos.x = Math.floor(COLS/2) - Math.floor(player.matrix[0].length/2);
            canHold = true; isLocking = false; lockTimer = 0;

            if (collide(arena, player)) triggerGameOver();
            else syncLocalState();
        }

        function hold() {
            if(!canHold || !gameRunning) return;
            const cur = player.matrix;
            if(holdPiece) {
                player.matrix = holdPiece; holdPiece = cur;
                player.pos.y = 0; player.pos.x = Math.floor(COLS/2) - Math.floor(player.matrix[0].length/2);
            } else { holdPiece = cur; resetPlayer(); }
            canHold = false; isLocking = false; syncLocalState();
        }

        function collide(board, obj) {
            const [m, o] = [obj.matrix, obj.pos];
            for(let y=0; y<m.length; ++y) {
                for(let x=0; x<m[y].length; ++x) {
                    if(m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge() {
            player.matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if(val !== 0) arena[y + player.pos.y][x + player.pos.x] = val;
                });
            });
        }

        function sweep() {
            let linesCleared = 0;
            outer: for(let y = ROWS - 1; y >= 0; --y) {
                for(let x = 0; x < COLS; ++x) if(arena[y][x] === 0) continue outer;
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y; linesCleared++;
            }
            
            if(linesCleared > 0) {
                player.score += (linesCleared === 1 ? 100 : linesCleared === 2 ? 300 : linesCleared === 3 ? 500 : 800);
                document.getElementById('my-score').innerText = player.score;
                
                if(linesCleared >= 2) {
                    let sent = linesCleared === 2 ? 1 : linesCleared === 3 ? 2 : 4;
                    sendAttack(sent);
                }
            }
        }

        function receiveGarbage(lines) {
            if(!gameRunning) return;
            
            const alertEl = document.getElementById('attack-alert');
            alertEl.classList.add('active');
            setTimeout(() => alertEl.classList.remove('active'), 1000);

            for(let i=0; i<lines; i++) {
                let row = new Array(COLS).fill(8); 
                row[Math.floor(Math.random() * COLS)] = 0; 
                arena.shift(); 
                arena.push(row);
            }
            
            while(collide(arena, player)) {
                player.pos.y--;
                if(player.pos.y < 0) { triggerGameOver(); return; }
            }
            syncLocalState();
        }

        function attemptMove(dir) {
            player.pos.x += dir;
            if(collide(arena, player)) { player.pos.x -= dir; return false; }
            if(isLocking) lockTimer = 0;
            checkLockCondition(); syncLocalState(); return true;
        }

        function checkLockCondition() {
            player.pos.y++;
            if(collide(arena, player)) isLocking = true;
            else { isLocking = false; lockTimer = 0; }
            player.pos.y--;
        }

        function lockPiece() { merge(); sweep(); resetPlayer(); }

        function attemptDrop() {
            player.pos.y++;
            if(collide(arena, player)) {
                player.pos.y--;
                if(!isLocking) { isLocking = true; lockTimer = 0; }
            } else {
                isLocking = false; lockTimer = 0;
                if(keys.down) { player.score += 1; document.getElementById('my-score').innerText = player.score; }
            }
            syncLocalState();
        }

        function hardDrop() {
            let dropped = 0;
            while(!collide(arena, player)) { player.pos.y++; dropped++; }
            player.pos.y--;
            player.score += Math.max(0, dropped - 1) * 2; 
            document.getElementById('my-score').innerText = player.score;
            lockPiece(); syncLocalState();
        }

        function rotate(dir) {
            const pos = player.pos.x;
            const origMatrix = player.matrix.map(row => [...row]);
            
            for(let y=0; y<player.matrix.length; ++y) {
                for(let x=0; x<y; ++x) [player.matrix[x][y], player.matrix[y][x]] = [player.matrix[y][x], player.matrix[x][y]];
            }
            if(dir > 0) player.matrix.forEach(r => r.reverse()); else player.matrix.reverse();
            
            let offset = 1;
            while(collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if(offset > player.matrix[0].length + 1) {
                    player.matrix = origMatrix; player.pos.x = pos; return;
                }
            }
            if(isLocking) lockTimer = 0;
            checkLockCondition(); syncLocalState();
        }

        function getGhostY() {
            let ghostY = player.pos.y;
            while(!collide(arena, { matrix: player.matrix, pos: {x: player.pos.x, y: ghostY + 1} })) ghostY++;
            return ghostY;
        }

        function drawBlock(x, y, colorStr, ctx, isGhost=false, isGarbage=false) {
            if(isGhost) {
                ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(x, y, 1, 1);
                ctx.strokeStyle = colorStr; ctx.lineWidth = 0.08; ctx.strokeRect(x+0.04, y+0.04, 0.92, 0.92);
            } else {
                ctx.fillStyle = colorStr; ctx.fillRect(x, y, 1, 1);
                if(isGarbage) {
                    ctx.strokeStyle = '#222'; ctx.lineWidth = 0.05; ctx.strokeRect(x,y,1,1);
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.fillRect(x, y, 1, 0.15); ctx.fillRect(x, y, 0.15, 1);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.fillRect(x, y + 0.85, 1, 0.15); ctx.fillRect(x + 0.85, y, 0.15, 1);
                }
            }
        }

        function drawMatrix(matrix, offset, ctx, isGhost=false) {
            if(!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if(val !== 0) drawBlock(x + offset.x, y + offset.y, colors[val], ctx, isGhost, val === 8);
                });
            });
        }

        function drawBoxPiece(matrix, ctx) {
            ctx.clearRect(0, 0, 4, 4);
            if(!matrix) return;
            const w = matrix[0].length, h = matrix.length;
            drawMatrix(matrix, { x: (4 - w)/2, y: (4 - h)/2 }, ctx);
        }

        function renderLocal() {
            ctxMain.clearRect(0, 0, COLS, ROWS);
            ctxMain.strokeStyle = 'rgba(255,255,255,0.05)'; ctxMain.lineWidth = 0.05;
            for(let i=1; i<COLS; i++){ ctxMain.beginPath(); ctxMain.moveTo(i,0); ctxMain.lineTo(i,ROWS); ctxMain.stroke(); }
            for(let i=1; i<ROWS; i++){ ctxMain.beginPath(); ctxMain.moveTo(0,i); ctxMain.lineTo(COLS,i); ctxMain.stroke(); }

            drawMatrix(arena, {x:0, y:0}, ctxMain);
            
            if (player.matrix && localStatus === 'playing') {
                drawMatrix(player.matrix, {x: player.pos.x, y: getGhostY()}, ctxMain, true);
                drawMatrix(player.matrix, player.pos, ctxMain, false);
            }
            
            drawBoxPiece(holdPiece, ctxHold);
            drawBoxPiece(nextPiece, ctxNext);
        }

        let lastTime = 0, dropCounter = 0;

        function update(time = 0) {
            const dt = time - lastTime; lastTime = time;

            if(gameRunning) {
                if(keys.left || keys.right) {
                    dasTimer += dt;
                    if(dasTimer >= DAS) {
                        let arrTicks = Math.floor((dasTimer - DAS) / ARR);
                        if(arrTicks > 0) {
                            for(let i=0; i<arrTicks; i++) attemptMove(keys.left ? -1 : 1);
                            dasTimer -= arrTicks * ARR;
                        }
                    }
                } else { dasTimer = 0; }

                dropCounter += dt;
                const currentGravity = keys.down ? dropInterval / 20 : dropInterval; 
                while(dropCounter > currentGravity) { attemptDrop(); dropCounter -= currentGravity; }

                if(isLocking) { lockTimer += dt; if(lockTimer >= lockDelayLimit) lockPiece(); }
            }

            renderLocal();
            requestAnimationFrame(update);
        }

        function startGameEngine() {
            gameStartedFlag = true;
            gameRunning = true; localStatus = 'playing';
            document.getElementById('main-container').style.borderColor = "var(--border)";
            document.getElementById('game-overlay').style.display = 'none';
            arena.forEach(row => row.fill(0));
            player.score = 0; document.getElementById('my-score').innerText = '0';
            resetPlayer(); lastTime = performance.now(); update();
        }

        // --- INPUTS ---
        document.addEventListener('keydown', e => {
            if(!gameRunning) return;
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();

            if(e.code === 'ArrowLeft') { if(!keys.left) { attemptMove(-1); dasTimer = 0; } keys.left = true; }
            if(e.code === 'ArrowRight') { if(!keys.right) { attemptMove(1); dasTimer = 0; } keys.right = true; }
            if(e.code === 'ArrowDown') keys.down = true;

            if(e.code === 'ArrowUp' || e.code === 'KeyX') rotate(1);
            if(e.code === 'KeyZ') rotate(-1);
            if(e.code === 'Space') hardDrop();
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'KeyC') hold();
        });

        document.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'ArrowRight') keys.right = false;
            if(e.code === 'ArrowDown') keys.down = false;
        });

    </script>
</body>
</html>
