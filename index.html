<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Duel | Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0b0f;
            --panel-bg: rgba(20, 20, 30, 0.8);
            --border: #2a2a3f;
            --accent: #00ffcc;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; touch-action: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 204, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        h1 {
            font-family: 'Jura', sans-serif;
            font-size: 2.5rem;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent);
        }

        /* --- MENU UI --- */
        #menu {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 350px;
            margin-top: 5vh;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-family: 'Jura', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #000;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .menu-btn:hover { box-shadow: 0 0 15px var(--accent); transform: scale(1.02); }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 1.5rem;
            text-align: center;
            border-radius: 6px;
            font-family: monospace;
            letter-spacing: 3px;
        }
        input:focus { outline: none; border-color: var(--accent); }

        .id-box { font-size: 2rem; color: var(--accent); font-weight: bold; letter-spacing: 5px; margin: 15px 0; }
        
        #status { color: #aaa; margin-bottom: 10px; font-size: 1.1rem; }

        /* --- GAME UI --- */
        #game-wrapper {
            display: none;
            flex-direction: row;
            gap: 20px;
            height: 100%;
            max-height: 800px;
            padding: 10px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        .player-area {
            display: flex;
            gap: 10px;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .box-title { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;}
        .canvas-box {
            background: #000;
            border: 2px solid #333;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
        }

        canvas.main-board {
            border: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .score-display { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        /* --- MOBILE CONTROLS --- */
        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 10px;
            gap: 10px;
            margin-top: auto;
            margin-bottom: 20px;
        }
        
        .d-pad, .action-pad { display: grid; gap: 8px; flex: 1; }
        .d-pad { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 60px); }
        .action-pad { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 60px); }
        
        .m-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .m-btn:active { background: rgba(0, 255, 204, 0.4); }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 800px) {
            h1 { font-size: 1.8rem; }
            #game-wrapper { flex-direction: column; align-items: center; overflow-y: auto; justify-content: flex-start; gap: 10px;}
            .player-area { transform: scale(0.85); transform-origin: top center; margin-bottom: -30px;}
            #remote-area { display: none; } /* Hide opponent board on small phones to save space */
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

    <h1>Tetris Duel Pro</h1>
    <div id="status">Ready to connect</div>

    <div id="menu">
        <div id="menu-main">
            <button class="menu-btn" onclick="hostGame()">Host Game</button>
            <div style="margin: 20px 0; color: #666;">- OR -</div>
            <input type="text" id="join-id" placeholder="5-DIGIT CODE" maxlength="5">
            <button class="menu-btn" style="background: #ff0055; color: white;" onclick="joinGame()">Join Game</button>
        </div>
        <div id="menu-host" style="display:none;">
            <p style="color: #aaa;">Share this code with your opponent:</p>
            <div class="id-box" id="room-id-display">-----</div>
            <button class="menu-btn" onclick="copyId()">Copy Code</button>
        </div>
    </div>

    <div id="game-wrapper">
        <!-- LOCAL PLAYER -->
        <div class="player-area" id="local-area">
            <div class="side-panel">
                <div class="canvas-box">
                    <div class="box-title">Hold</div>
                    <canvas id="hold-canvas" width="80" height="80"></canvas>
                </div>
                <div class="box-title">Score</div>
                <div class="score-display" id="local-score">0</div>
            </div>
            <div class="canvas-box" style="padding: 0;">
                <canvas id="main-canvas" class="main-board" width="240" height="480"></canvas>
            </div>
            <div class="side-panel">
                <div class="canvas-box">
                    <div class="box-title">Next</div>
                    <canvas id="next-canvas" width="80" height="80"></canvas>
                </div>
            </div>
        </div>

        <!-- REMOTE OPPONENT -->
        <div class="player-area" id="remote-area" style="opacity: 0.8; transform: scale(0.9);">
            <div class="side-panel">
                <div class="canvas-box">
                    <div class="box-title">Hold</div>
                    <canvas id="r-hold-canvas" width="80" height="80"></canvas>
                </div>
                <div class="box-title">Opponent</div>
                <div class="score-display" id="remote-score" style="color:#ff0055;">0</div>
            </div>
            <div class="canvas-box" style="padding: 0;">
                <canvas id="r-main-canvas" class="main-board" width="240" height="480"></canvas>
            </div>
            <div class="side-panel">
                <div class="canvas-box">
                    <div class="box-title">Next</div>
                    <canvas id="r-next-canvas" width="80" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls">
        <div class="d-pad">
            <div class="m-btn btn-up" id="m-hd">⇈</div> <!-- Hard Drop -->
            <div class="m-btn btn-left" id="m-l">←</div>
            <div class="m-btn btn-down" id="m-d">↓</div>
            <div class="m-btn btn-right" id="m-r">→</div>
        </div>
        <div class="action-pad">
            <div class="m-btn" id="m-ccw">↺</div>
            <div class="m-btn" id="m-cw">↻</div>
            <div class="m-btn" style="grid-column: span 2;" id="m-hold">HOLD</div>
        </div>
    </div>

    <script>
        // ==========================================
        // MULTIPLAYER (PEERJS) LOGIC
        // ==========================================
        let peer, connection;
        let isMultiplayer = false;
        let myId = "";

        const setStatus = (msg, color="#fff") => {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.style.color = color;
        };

        function hostGame() {
            document.getElementById('menu-main').style.display = 'none';
            document.getElementById('menu-host').style.display = 'block';
            
            myId = Math.floor(10000 + Math.random() * 90000).toString();
            document.getElementById('room-id-display').innerText = myId;
            setStatus("Waiting for opponent...", "#00ffcc");

            peer = new Peer(myId);
            peer.on('connection', conn => {
                connection = conn;
                initConnection();
            });
        }

        function joinGame() {
            const roomId = document.getElementById('join-id').value.trim();
            if(roomId.length !== 5) return alert("Enter 5-digit code");
            
            setStatus("Connecting...", "#ff0055");
            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect(roomId);
                connection.on('open', initConnection);
                connection.on('error', () => setStatus("Connection failed", "red"));
            });
        }

        function initConnection() {
            isMultiplayer = true;
            setStatus("Connected! MATCH START", "#00ffcc");
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'flex';
            
            connection.on('data', data => {
                if(data.type === 'state') updateRemoteState(data);
            });

            startGame();
        }

        function copyId() {
            navigator.clipboard.writeText(myId);
        }

        function broadcastState() {
            if(!isMultiplayer || !connection) return;
            connection.send({
                type: 'state',
                arena: arena,
                player: player,
                ghostY: getGhostY(),
                hold: holdPiece,
                next: nextPiece,
                score: player.score
            });
        }

        // ==========================================
        // TETRIS ENGINE
        // ==========================================
        const COLS = 10, ROWS = 20, BLOCK_SIZE = 24;
        
        // Contexts
        const ctxMain = document.getElementById('main-canvas').getContext('2d');
        const ctxHold = document.getElementById('hold-canvas').getContext('2d');
        const ctxNext = document.getElementById('next-canvas').getContext('2d');
        
        const rctxMain = document.getElementById('r-main-canvas').getContext('2d');
        const rctxHold = document.getElementById('r-hold-canvas').getContext('2d');
        const rctxNext = document.getElementById('r-next-canvas').getContext('2d');

        [ctxMain, rctxMain].forEach(ctx => ctx.scale(BLOCK_SIZE, BLOCK_SIZE));
        [ctxHold, ctxNext, rctxHold, rctxNext].forEach(ctx => ctx.scale(20, 20)); // scale for side panels

        // Tetr.io Color Palette
        const colors = [
            null,
            '#ff0f0f', // Z - Red
            '#ff7f00', // L - Orange
            '#ffe138', // O - Yellow
            '#0f9bd7', // J - Blue
            '#2141c6', // I - Cyan (Adjusted to visible blue)
            '#59b101', // S - Green
            '#af298a'  // T - Purple
        ];
        // Replacing Cyan with lighter blue for visual pop
        colors[5] = '#00ffff'; 

        const pieces = {
            'Z': [[1,1,0],[0,1,1],[0,0,0]],
            'L': [[0,0,2],[2,2,2],[0,0,0]],
            'O': [[3,3],[3,3]],
            'J': [[4,0,0],[4,4,4],[0,0,0]],
            'I': [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]],
            'S': [[0,6,6],[6,6,0],[0,0,0]],
            'T': [[0,7,0],[7,7,7],[0,0,0]]
        };

        let arena = createMatrix(COLS, ROWS);
        let bag = [];
        let nextPiece = null;
        let holdPiece = null;
        let canHold = true;
        let gameRunning = false;

        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        function createMatrix(w, h) {
            const m = [];
            while (h--) m.push(new Array(w).fill(0));
            return m;
        }

        // 7-Bag Randomizer
        function getNextBagPiece() {
            if (bag.length === 0) {
                bag = ['I','J','L','O','S','T','Z'];
                bag.sort(() => Math.random() - 0.5);
            }
            return pieces[bag.pop()];
        }

        function resetPlayer() {
            if(!nextPiece) nextPiece = getNextBagPiece();
            player.matrix = nextPiece;
            nextPiece = getNextBagPiece();
            player.pos.y = 0;
            player.pos.x = Math.floor(COLS/2) - Math.floor(player.matrix[0].length/2);
            canHold = true;

            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                holdPiece = null;
            }
            broadcastState();
        }

        function hold() {
            if (!canHold) return;
            const current = player.matrix;
            if (holdPiece) {
                player.matrix = holdPiece;
                holdPiece = current;
                player.pos.y = 0;
                player.pos.x = Math.floor(COLS/2) - Math.floor(player.matrix[0].length/2);
            } else {
                holdPiece = current;
                resetPlayer();
            }
            canHold = false;
            broadcastState();
        }

        // --- COLLISION & MOVEMENT ---
        function collide(board, obj) {
            const [m, o] = [obj.matrix, obj.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(board, obj) {
            obj.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) board[y + obj.pos.y][x + obj.pos.x] = value;
                });
            });
        }

        function sweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 100;
                rowCount *= 2;
            }
            document.getElementById('local-score').innerText = player.score;
        }

        function move(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
            broadcastState();
        }

        function drop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                sweep();
                resetPlayer();
            }
            dropCounter = 0;
            broadcastState();
        }

        function getGhostY() {
            let ghostY = player.pos.y;
            while (!collide(arena, { matrix: player.matrix, pos: { x: player.pos.x, y: ghostY + 1 } })) {
                ghostY++;
            }
            return ghostY;
        }

        function hardDrop() {
            player.pos.y = getGhostY();
            merge(arena, player);
            sweep();
            resetPlayer();
            dropCounter = 0;
            broadcastState();
        }

        function rotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            // Transpose & Reverse
            for (let y = 0; y < player.matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [player.matrix[x][y], player.matrix[y][x]] = [player.matrix[y][x], player.matrix[x][y]];
                }
            }
            if (dir > 0) player.matrix.forEach(r => r.reverse());
            else player.matrix.reverse();
            
            // Wall Kick logic
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    // Undo rotation if failed
                    rotate(-dir);
                    player.pos.x = pos;
                    return;
                }
            }
            broadcastState();
        }

        // --- DRAWING ---
        function drawGrid(ctx, w, h) {
            ctx.lineWidth = 0.05;
            ctx.strokeStyle = '#222';
            for(let i=0; i<=w; i++){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
            for(let i=0; i<=h; i++){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }
        }

        function drawMatrix(matrix, offset, ctx, alpha=1) {
            if(!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Inner Glow / Bevel
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 0.1); // top
                        ctx.fillRect(x + offset.x, y + offset.y, 0.1, 1); // left
                        ctx.fillStyle = 'rgba(0,0,0,0.4)';
                        ctx.fillRect(x + offset.x, y + offset.y + 0.9, 1, 0.1); // bottom
                        ctx.fillRect(x + offset.x + 0.9, y + offset.y, 0.1, 1); // right
                        ctx.globalAlpha = 1;
                    }
                });
            });
        }

        function drawBoxPiece(matrix, ctx) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,4,4);
            if(!matrix) return;
            // Center the piece in the 4x4 mini box
            const offset = {
                x: (4 - matrix[0].length)/2,
                y: (4 - matrix.length)/2
            };
            drawMatrix(matrix, offset, ctx);
        }

        function drawLocal() {
            ctxMain.fillStyle = '#0a0a0a';
            ctxMain.fillRect(0, 0, COLS, ROWS);
            drawGrid(ctxMain, COLS, ROWS);

            drawMatrix(arena, {x:0, y:0}, ctxMain);
            // Draw Ghost
            drawMatrix(player.matrix, {x: player.pos.x, y: getGhostY()}, ctxMain, 0.2);
            // Draw Player
            drawMatrix(player.matrix, player.pos, ctxMain);

            drawBoxPiece(holdPiece, ctxHold);
            drawBoxPiece(nextPiece, ctxNext);
        }

        function updateRemoteState(data) {
            rctxMain.fillStyle = '#0a0a0a';
            rctxMain.fillRect(0, 0, COLS, ROWS);
            drawGrid(rctxMain, COLS, ROWS);

            drawMatrix(data.arena, {x:0, y:0}, rctxMain);
            drawMatrix(data.player.matrix, {x: data.player.pos.x, y: data.ghostY}, rctxMain, 0.2);
            drawMatrix(data.player.matrix, data.player.pos, rctxMain);

            drawBoxPiece(data.hold, rctxHold);
            drawBoxPiece(data.next, rctxNext);
            document.getElementById('remote-score').innerText = data.score;
        }

        // --- GAME LOOP ---
        let dropCounter = 0;
        let lastTime = 0;

        function update(time = 0) {
            if(!gameRunning) return;
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > 1000) drop();

            drawLocal();
            requestAnimationFrame(update);
        }

        function startGame() {
            gameRunning = true;
            resetPlayer();
            update();
        }

        // --- INPUTS (Desktop & Mobile) ---
        document.addEventListener('keydown', e => {
            if(!gameRunning) return;
            switch(e.code) {
                case 'ArrowLeft': move(-1); break;
                case 'ArrowRight': move(1); break;
                case 'ArrowDown': drop(); break;
                case 'ArrowUp': 
                case 'KeyX': rotate(1); break;
                case 'KeyZ': rotate(-1); break;
                case 'Space': hardDrop(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                case 'KeyC': hold(); break;
            }
        });

        // Mobile Button Handlers
        const bindBtn = (id, action) => {
            const btn = document.getElementById(id);
            if(!btn) return;
            // Prevent default stops zooming and double-tap issues
            btn.addEventListener('touchstart', e => { e.preventDefault(); action(); });
        };

        bindBtn('m-l', () => move(-1));
        bindBtn('m-r', () => move(1));
        bindBtn('m-d', drop);
        bindBtn('m-hd', hardDrop);
        bindBtn('m-cw', () => rotate(1));
        bindBtn('m-ccw', () => rotate(-1));
        bindBtn('m-hold', hold);

        // Prevent mobile scrolling while dragging on the canvas
        document.addEventListener('touchmove', e => {
            if(gameRunning) e.preventDefault();
        }, { passive: false });

    </script>
</body>
</html>
