<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pro Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f1115;
            --surface: #1a1d24;
            --surface-hover: #232730;
            --border: #2d313a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1, h2, h3 { margin: 0; }

        /* --- SCREENS --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .screen.active { display: flex; }

        /* --- MENU & LOBBY UI --- */
        .panel {
            background: var(--surface);
            padding: 32px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .title { font-size: 24px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.5px; }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; border-bottom: 1px solid var(--border); margin: 0 10px;
        }

        #error-msg { color: var(--danger); font-size: 14px; margin-bottom: 16px; display: none; }
        
        .code-display {
            font-size: 32px; font-weight: 700; letter-spacing: 4px; color: var(--primary); margin: 16px 0;
        }

        .player-list {
            text-align: left; background: var(--bg-color); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; margin-bottom: 16px;
        }
        .player-item { padding: 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .player-item:last-child { border-bottom: none; }

        /* --- GAME UI --- */
        #game-layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            padding: 20px;
            gap: 24px;
        }

        /* Opponents Section */
        #opponents-area {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 16px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            padding-right: 20px;
        }

        .opponent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: fit-content;
        }
        .opponent-name { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .opponent-canvas { background: #000; border: 1px solid var(--border); }

        /* Main Player Section */
        #my-area {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .info-title { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .info-value { font-size: 24px; font-weight: 700; color: var(--text-main); }
        
        .main-canvas-container {
            background: #000;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <!-- 1. SETUP SCREEN -->
    <div id="screen-setup" class="screen active">
        <div class="panel">
            <div class="title">Tetris Pro</div>
            <div id="error-msg"></div>
            
            <input type="text" id="username" placeholder="Enter your Name" maxlength="12">
            
            <button onclick="createRoom()">Host New Game</button>
            <div class="divider">OR</div>
            <input type="text" id="join-code" placeholder="5-Digit Room Code" maxlength="5">
            <button onclick="joinRoom()" style="background: var(--surface-hover); border: 1px solid var(--border);">Join Game</button>
        </div>
    </div>

    <!-- 2. LOBBY SCREEN -->
    <div id="screen-lobby" class="screen">
        <div class="panel">
            <div class="title">Lobby</div>
            <div id="lobby-code-area" style="display:none;">
                <div style="font-size: 14px; color: var(--text-muted);">Room Code:</div>
                <div class="code-display" id="lobby-code">-----</div>
            </div>
            
            <div style="font-size: 14px; color: var(--text-muted); text-align: left; margin-bottom: 8px;">Players:</div>
            <div class="player-list" id="player-list">
                <!-- Players injected here -->
            </div>

            <div id="lobby-status" style="font-size: 14px; color: var(--text-muted); margin-bottom: 16px;">Waiting for host to start...</div>
            
            <button id="btn-start" onclick="startGameAsHost()" style="display:none;">Start Game</button>
        </div>
    </div>

    <!-- 3. GAME SCREEN -->
    <div id="screen-game" class="screen">
        <div id="game-layout">
            
            <!-- Opponents Grid -->
            <div id="opponents-area">
                <!-- Opponent cards generated here -->
            </div>

            <!-- Your Board Center -->
            <div id="my-area">
                <div class="side-panel">
                    <div class="info-box">
                        <div class="info-title">Hold (Shift)</div>
                        <canvas id="canvas-hold" width="80" height="80"></canvas>
                    </div>
                    <div class="info-box">
                        <div class="info-title">Score</div>
                        <div class="info-value" id="my-score">0</div>
                    </div>
                </div>

                <div class="main-canvas-container">
                    <canvas id="canvas-main" width="240" height="480"></canvas>
                </div>

                <div class="side-panel">
                    <div class="info-box">
                        <div class="info-title">Next</div>
                        <canvas id="canvas-next" width="80" height="80"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // UI & STATE MANAGEMENT
        // ==========================================
        let myName = "";
        let myPeerId = "";
        let isHost = false;
        
        const showError = (msg) => {
            const err = document.getElementById('error-msg');
            err.innerText = msg;
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }

        const switchScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ==========================================
        // NETWORKING (WebRTC / PeerJS)
        // Hub & Spoke: All peers connect to Host. Host broadcasts.
        // ==========================================
        let peer;
        let hostConnection; // For peers connecting to host
        let peerConnections = {}; // For host managing peers
        let playersData = {}; // { id: { name, score, arena, status } }

        function initPeer(id, onOpen) {
            peer = new Peer(id);
            peer.on('open', onOpen);
            peer.on('error', err => {
                showError("Connection error. Try again.");
                switchScreen('screen-setup');
            });
        }

        // --- HOST LOGIC ---
        function createRoom() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return showError("Enter a name");

            const roomId = Math.floor(10000 + Math.random() * 90000).toString();
            isHost = true;
            
            initPeer(roomId, (id) => {
                myPeerId = id;
                playersData[myPeerId] = { name: myName, score: 0, status: 'lobby' };
                
                document.getElementById('lobby-code').innerText = id;
                document.getElementById('lobby-code-area').style.display = 'block';
                document.getElementById('btn-start').style.display = 'block';
                document.getElementById('lobby-status').style.display = 'none';
                
                updateLobbyUI();
                switchScreen('screen-lobby');

                // Handle incoming peers
                peer.on('connection', conn => {
                    conn.on('open', () => {
                        const peerName = conn.metadata.name;
                        // Name validation
                        const isTaken = Object.values(playersData).some(p => p.name.toLowerCase() === peerName.toLowerCase());
                        if(isTaken) {
                            conn.send({ type: 'rejected', reason: 'Name is already taken in this room.' });
                            setTimeout(() => conn.close(), 500);
                            return;
                        }

                        // Accept
                        peerConnections[conn.peer] = conn;
                        playersData[conn.peer] = { name: peerName, score: 0, status: 'lobby' };
                        
                        conn.send({ type: 'accepted', myId: conn.peer });
                        broadcastLobby();

                        // Listen to peer data
                        conn.on('data', data => {
                            if(data.type === 'state_update') {
                                playersData[conn.peer].arena = data.arena;
                                playersData[conn.peer].score = data.score;
                                playersData[conn.peer].status = data.status;
                                broadcastGameState(); // relay to everyone else
                            }
                        });

                        conn.on('close', () => {
                            delete peerConnections[conn.peer];
                            delete playersData[conn.peer];
                            broadcastLobby();
                        });
                    });
                });
            });
        }

        function broadcastLobby() {
            const list = Object.keys(playersData).map(id => ({ id, name: playersData[id].name }));
            Object.values(peerConnections).forEach(c => c.send({ type: 'lobby_update', players: list }));
            updateLobbyUI();
        }

        function broadcastGameState() {
            // Compress state to send minimal required data
            const state = {};
            for(let id in playersData) {
                if(id !== myPeerId) {
                    state[id] = { arena: playersData[id].arena, score: playersData[id].score, status: playersData[id].status };
                }
            }
            Object.values(peerConnections).forEach(c => c.send({ type: 'game_sync', state }));
            renderOpponents(state);
        }

        // --- PEER LOGIC ---
        function joinRoom() {
            myName = document.getElementById('username').value.trim();
            const code = document.getElementById('join-code').value.trim();
            if(!myName) return showError("Enter a name");
            if(code.length !== 5) return showError("Invalid 5-digit code");

            initPeer(null, () => {
                hostConnection = peer.connect(code, { metadata: { name: myName } });
                
                hostConnection.on('open', () => {
                    hostConnection.on('data', data => {
                        if(data.type === 'rejected') {
                            showError(data.reason);
                            peer.destroy();
                        }
                        else if(data.type === 'accepted') {
                            myPeerId = data.myId;
                            switchScreen('screen-lobby');
                        }
                        else if(data.type === 'lobby_update') {
                            playersData = {};
                            data.players.forEach(p => playersData[p.id] = p);
                            updateLobbyUI();
                        }
                        else if(data.type === 'start_game') {
                            setupOpponentCanvases();
                            switchScreen('screen-game');
                            startGameEngine();
                        }
                        else if(data.type === 'game_sync') {
                            renderOpponents(data.state);
                        }
                    });

                    hostConnection.on('close', () => {
                        alert("Host disconnected.");
                        location.reload();
                    });
                });
            });
        }

        function updateLobbyUI() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            Object.values(playersData).forEach(p => {
                const el = document.createElement('div');
                el.className = 'player-item';
                el.innerText = p.name + (p.name === myName ? ' (You)' : '');
                list.appendChild(el);
            });
        }

        function startGameAsHost() {
            Object.values(peerConnections).forEach(c => c.send({ type: 'start_game' }));
            setupOpponentCanvases();
            switchScreen('screen-game');
            startGameEngine();
        }

        // Sends local game state to host (or processes it if I am host)
        function syncLocalState() {
            const combinedMatrix = createMatrix(COLS, ROWS);
            // Combine fixed blocks
            for(let y=0; y<ROWS; y++){
                for(let x=0; x<COLS; x++) combinedMatrix[y][x] = arena[y][x];
            }
            // Overlay current piece
            if(player.matrix) {
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if(value !== 0 && combinedMatrix[y + player.pos.y]) {
                            combinedMatrix[y + player.pos.y][x + player.pos.x] = value;
                        }
                    });
                });
            }

            if(isHost) {
                playersData[myPeerId].arena = combinedMatrix;
                playersData[myPeerId].score = player.score;
                broadcastGameState();
            } else {
                hostConnection.send({ type: 'state_update', arena: combinedMatrix, score: player.score, status: 'playing' });
            }
        }


        // ==========================================
        // DYNAMIC RENDERING FOR OPPONENTS
        // ==========================================
        const opponentCtxs = {};

        function setupOpponentCanvases() {
            const container = document.getElementById('opponents-area');
            container.innerHTML = '';
            
            for(let id in playersData) {
                if(id === myPeerId) continue;
                
                const card = document.createElement('div');
                card.className = 'opponent-card';
                
                const nameLabel = document.createElement('div');
                nameLabel.className = 'opponent-name';
                nameLabel.innerText = playersData[id].name;
                
                const canvas = document.createElement('canvas');
                canvas.className = 'opponent-canvas';
                canvas.width = 100; // Scaled down
                canvas.height = 200;
                
                const scoreLabel = document.createElement('div');
                scoreLabel.className = 'opponent-name';
                scoreLabel.style.marginTop = '8px';
                scoreLabel.id = `score-${id}`;
                scoreLabel.innerText = '0';

                card.appendChild(nameLabel);
                card.appendChild(canvas);
                card.appendChild(scoreLabel);
                container.appendChild(card);

                const ctx = canvas.getContext('2d');
                ctx.scale(10, 10); // 100px / 10 cols = 10px per block
                opponentCtxs[id] = ctx;
            }
        }

        function renderOpponents(states) {
            for(let id in states) {
                if(id === myPeerId) continue;
                const ctx = opponentCtxs[id];
                if(!ctx) continue;
                
                ctx.fillStyle = '#0f1115';
                ctx.fillRect(0, 0, COLS, ROWS);
                
                if(states[id].arena) {
                    drawMatrix(states[id].arena, {x:0, y:0}, ctx);
                }
                
                const scoreEl = document.getElementById(`score-${id}`);
                if(scoreEl) scoreEl.innerText = states[id].score;
            }
        }

        // ==========================================
        // TETRIS ENGINE WITH ADVANCED MECHANICS
        // ==========================================
        const COLS = 10, ROWS = 20, BLOCK_SIZE = 24;
        const ctxMain = document.getElementById('canvas-main').getContext('2d');
        const ctxHold = document.getElementById('canvas-hold').getContext('2d');
        const ctxNext = document.getElementById('canvas-next').getContext('2d');
        
        ctxMain.scale(BLOCK_SIZE, BLOCK_SIZE);
        ctxHold.scale(20, 20);
        ctxNext.scale(20, 20);

        // Professional Color Palette (Flat & Clean)
        const colors = [
            null,
            '#ef4444', // Z - Red
            '#f97316', // L - Orange
            '#eab308', // O - Yellow
            '#3b82f6', // J - Blue
            '#06b6d4', // I - Cyan
            '#22c55e', // S - Green
            '#a855f7'  // T - Purple
        ];

        const pieces = {
            'Z': [[1,1,0],[0,1,1],[0,0,0]],
            'L': [[0,0,2],[2,2,2],[0,0,0]],
            'O': [[3,3],[3,3]],
            'J': [[4,0,0],[4,4,4],[0,0,0]],
            'I': [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]],
            'S': [[0,6,6],[6,6,0],[0,0,0]],
            'T': [[0,7,0],[7,7,7],[0,0,0]]
        };

        function createMatrix(w, h) {
            const m = [];
            while(h--) m.push(new Array(w).fill(0));
            return m;
        }

        let arena = createMatrix(COLS, ROWS);
        let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let bag = [];
        let nextPiece = null;
        let holdPiece = null;
        let canHold = true;
        let gameRunning = false;

        // Advanced Mechanics Timers
        let dropInterval = 1000;
        let lockDelayLimit = 500; // ms
        let lockTimer = 0;
        let isLocking = false;
        
        // Input Handling (DAS & ARR)
        const keys = { left: false, right: false, down: false };
        let dasTimer = 0;
        const DAS = 170; // Delayed Auto Shift (ms)
        const ARR = 50;  // Auto Repeat Rate (ms)

        function getBagPiece() {
            if(bag.length === 0) {
                bag = ['I','J','L','O','S','T','Z'];
                bag.sort(() => Math.random() - 0.5);
            }
            return pieces[bag.pop()];
        }

        function resetPlayer() {
            if(!nextPiece) nextPiece = getBagPiece();
            player.matrix = nextPiece;
            nextPiece = getBagPiece();
            player.pos.y = 0;
            player.pos.x = Math.floor(COLS/2) - Math.floor(player.matrix[0].length/2);
            canHold = true;
            isLocking = false;
            lockTimer = 0;

            if (collide(arena, player)) {
                // Game Over
                arena.forEach(row => row.fill(0));
                player.score = 0;
                holdPiece = null;
            }
            syncLocalState();
        }

        function hold() {
            if(!canHold) return;
            const cur = player.matrix;
            if(holdPiece) {
                player.matrix = holdPiece;
                holdPiece = cur;
                player.pos.y = 0;
                player.pos.x = Math.floor(COLS/2) - Math.floor(player.matrix[0].length/2);
            } else {
                holdPiece = cur;
                resetPlayer();
            }
            canHold = false;
            isLocking = false;
            syncLocalState();
        }

        function collide(board, obj) {
            const [m, o] = [obj.matrix, obj.pos];
            for(let y=0; y<m.length; ++y) {
                for(let x=0; x<m[y].length; ++x) {
                    if(m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge() {
            player.matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if(val !== 0) arena[y + player.pos.y][x + player.pos.x] = val;
                });
            });
        }

        function sweep() {
            let lines = 0;
            outer: for(let y = ROWS - 1; y >= 0; --y) {
                for(let x = 0; x < COLS; ++x) {
                    if(arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                lines++;
            }
            if(lines > 0) {
                player.score += (lines === 1 ? 100 : lines === 2 ? 300 : lines === 3 ? 500 : 800);
                document.getElementById('my-score').innerText = player.score;
            }
        }

        // Action Handlers
        function attemptMove(dir) {
            player.pos.x += dir;
            if(collide(arena, player)) {
                player.pos.x -= dir;
                return false;
            }
            // If locking, movement resets the lock timer
            if(isLocking) lockTimer = 0;
            checkLockCondition();
            syncLocalState();
            return true;
        }

        function checkLockCondition() {
            // Check if piece is touching ground
            player.pos.y++;
            if(collide(arena, player)) {
                isLocking = true;
            } else {
                isLocking = false;
                lockTimer = 0;
            }
            player.pos.y--;
        }

        function lockPiece() {
            merge();
            sweep();
            resetPlayer();
        }

        function attemptDrop() {
            player.pos.y++;
            if(collide(arena, player)) {
                player.pos.y--;
                if(!isLocking) {
                    isLocking = true;
                    lockTimer = 0;
                }
            } else {
                isLocking = false;
                lockTimer = 0;
                player.score += 1; // score for soft drop
            }
            syncLocalState();
        }

        function hardDrop() {
            while(!collide(arena, player)) player.pos.y++;
            player.pos.y--;
            player.score += 10;
            lockPiece();
            syncLocalState();
        }

        function rotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            // Transpose & Reverse
            for(let y=0; y<player.matrix.length; ++y) {
                for(let x=0; x<y; ++x) {
                    [player.matrix[x][y], player.matrix[y][x]] = [player.matrix[y][x], player.matrix[x][y]];
                }
            }
            if(dir > 0) player.matrix.forEach(r => r.reverse());
            else player.matrix.reverse();
            
            // Wall Kicks
            while(collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if(offset > player.matrix[0].length) {
                    // Revert
                    rotate(-dir);
                    player.pos.x = pos;
                    return;
                }
            }
            if(isLocking) lockTimer = 0;
            checkLockCondition();
            syncLocalState();
        }

        function getGhostY() {
            let ghostY = player.pos.y;
            while(!collide(arena, { matrix: player.matrix, pos: {x: player.pos.x, y: ghostY + 1} })) {
                ghostY++;
            }
            return ghostY;
        }

        // Render Helpers
        function drawMatrix(matrix, offset, ctx, alpha=1) {
            if(!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if(val !== 0) {
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = colors[val];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // Clean flat borders instead of neon
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.globalAlpha = 1;
                    }
                });
            });
        }

        function drawBoxPiece(matrix, ctx) {
            ctx.fillStyle = 'var(--surface)';
            ctx.fillRect(0,0,4,4);
            if(!matrix) return;
            const offset = { x: (4 - matrix[0].length)/2, y: (4 - matrix.length)/2 };
            drawMatrix(matrix, offset, ctx);
        }

        function renderLocal() {
            ctxMain.fillStyle = 'var(--bg-color)';
            ctxMain.fillRect(0, 0, COLS, ROWS);
            
            // Draw faint grid
            ctxMain.strokeStyle = 'var(--border)';
            ctxMain.lineWidth = 0.02;
            for(let i=0; i<=COLS; i++){ ctxMain.beginPath(); ctxMain.moveTo(i,0); ctxMain.lineTo(i,ROWS); ctxMain.stroke(); }
            for(let i=0; i<=ROWS; i++){ ctxMain.beginPath(); ctxMain.moveTo(0,i); ctxMain.lineTo(COLS,i); ctxMain.stroke(); }

            drawMatrix(arena, {x:0, y:0}, ctxMain);
            drawMatrix(player.matrix, {x: player.pos.x, y: getGhostY()}, ctxMain, 0.2); // Ghost
            drawMatrix(player.matrix, player.pos, ctxMain);

            drawBoxPiece(holdPiece, ctxHold);
            drawBoxPiece(nextPiece, ctxNext);
        }

        // Main Game Loop with Delta Time
        let lastTime = 0;
        let dropCounter = 0;

        function update(time = 0) {
            if(!gameRunning) return;
            const dt = time - lastTime;
            lastTime = time;

            // 1. Input Processing (DAS/ARR)
            if(keys.left || keys.right) {
                dasTimer += dt;
                if(dasTimer > DAS) {
                    let arrTicks = Math.floor((dasTimer - DAS) / ARR);
                    for(let i=0; i<arrTicks; i++) {
                        attemptMove(keys.left ? -1 : 1);
                    }
                    dasTimer = DAS + ((dasTimer - DAS) % ARR);
                }
            } else { dasTimer = 0; }

            // 2. Gravity Drop
            dropCounter += dt;
            const currentGravity = keys.down ? dropInterval / 10 : dropInterval; // Soft drop is 10x faster
            if(dropCounter > currentGravity) {
                attemptDrop();
                dropCounter = 0;
            }

            // 3. Lock Delay Processing
            if(isLocking) {
                lockTimer += dt;
                if(lockTimer >= lockDelayLimit) {
                    lockPiece();
                }
            }

            renderLocal();
            requestAnimationFrame(update);
        }

        function startGameEngine() {
            gameRunning = true;
            resetPlayer();
            lastTime = performance.now();
            update();
        }

        // Keyboard Inputs
        document.addEventListener('keydown', e => {
            if(!gameRunning) return;
            
            // Prevent default scrolling for game keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) {
                e.preventDefault();
            }

            // Movement tracking for DAS
            if(e.code === 'ArrowLeft' && !keys.left) { keys.left = true; attemptMove(-1); dasTimer = 0; }
            if(e.code === 'ArrowRight' && !keys.right) { keys.right = true; attemptMove(1); dasTimer = 0; }
            if(e.code === 'ArrowDown') keys.down = true;

            // Instants
            if(e.code === 'ArrowUp' || e.code === 'KeyX') rotate(1);
            if(e.code === 'KeyZ') rotate(-1);
            if(e.code === 'Space') hardDrop();
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'KeyC') hold();
        });

        document.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'ArrowRight') keys.right = false;
            if(e.code === 'ArrowDown') keys.down = false;
        });

    </script>
</body>
