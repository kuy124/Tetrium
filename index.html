<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Duel | Multiplayer</title>
    <!-- PeerJS for WebRTC Peer-to-Peer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- UI & LAYOUT STYLES --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: -webkit-linear-gradient(45deg, #3b82f6, #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Menu Card */
        #menu {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .menu-section h3 {
            margin-top: 0;
            font-weight: 600;
            color: var(--text-main);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 25px 0;
            position: relative;
        }
        .divider::after {
            content: "OR";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            padding: 0 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
        }

        /* Inputs & Buttons */
        input {
            width: calc(100% - 24px);
            padding: 12px;
            background: var(--bg-color);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 18px;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
            letter-spacing: 2px;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        button.success { background: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        button.success:hover { background: var(--success-hover); }

        .id-display-box {
            display: none;
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed var(--border);
            margin-top: 15px;
        }
        .id-text { font-size: 32px; font-weight: 800; letter-spacing: 4px; color: var(--success); margin: 10px 0;}
        
        .copy-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            padding: 6px 12px;
            width: auto;
            font-size: 12px;
            border-radius: 4px;
            color: var(--text-muted);
            box-shadow: none;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: white; transform: none;}

        #status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            background: #475569;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        /* --- GAME BOARDS --- */
        #game-container {
            display: none;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .player-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .player-card h2 { margin: 0 0 5px 0; color: var(--text-muted); font-size: 20px; }
        .score { font-size: 28px; font-weight: 800; margin-bottom: 15px; color: var(--primary); }
        .score-opponent { color: var(--success); }

        canvas {
            background-color: #000;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            border: 2px solid #334155;
        }

        .controls {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 8px;
        }
        kbd {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>Tetris Duel</h1>
    <p class="subtitle">Real-time Peer-to-Peer Multiplayer</p>

    <div id="status-badge">Waiting to start</div>

    <!-- MAIN MENU -->
    <div id="menu">
        <div class="menu-section">
            <h3>Host a New Game</h3>
            <button id="host-btn" onclick="hostGame()">Create Room</button>
            
            <div id="host-ui" class="id-display-box">
                <div style="font-size: 14px; color: var(--text-muted);">Share this 5-digit code:</div>
                <div class="id-text" id="room-id-display">-----</div>
                <button class="copy-btn" onclick="copyId()">Copy Code</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="menu-section">
            <h3>Join a Friend</h3>
            <input type="text" id="join-id" placeholder="Enter 5-digit code" maxlength="5">
            <button class="success" onclick="joinGame()">Join Game</button>
        </div>
    </div>

    <!-- GAME AREA -->
    <div id="game-container">
        <!-- Local Player -->
        <div class="player-card">
            <h2>You</h2>
            <div class="score" id="local-score">0</div>
            <canvas id="localCanvas" width="240" height="400"></canvas>
            <div class="controls">
                <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;|&nbsp; <kbd>↑</kbd> Rotate &nbsp;|&nbsp; <kbd>↓</kbd> Drop
            </div>
        </div>

        <!-- Remote Opponent -->
        <div class="player-card">
            <h2>Opponent</h2>
            <div class="score score-opponent" id="remote-score">0</div>
            <canvas id="remoteCanvas" width="240" height="400"></canvas>
            <div class="controls" style="visibility: hidden;">
                Placeholder
            </div>
        </div>
    </div>

    <script>
        // --- PEER-TO-PEER MULTIPLAYER LOGIC ---
        let peer;
        let connection;
        let isMultiplayer = false;
        let myShortId = "";

        // Generates a random 5-digit number to make typing easy
        function generateShortId() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        function updateStatus(msg, color) {
            const badge = document.getElementById('status-badge');
            badge.innerText = msg;
            badge.style.backgroundColor = color || '#475569';
        }

        // Host clicks "Create Room"
        function hostGame() {
            document.getElementById('host-btn').style.display = 'none';
            document.getElementById('host-ui').style.display = 'block';
            
            myShortId = generateShortId();
            document.getElementById('room-id-display').innerText = myShortId;
            updateStatus("Waiting for opponent...", "#eab308"); // Yellow

            // Force PeerJS to use our easy 5-digit ID
            peer = new Peer(myShortId);

            peer.on('connection', conn => {
                connection = conn;
                setupConnection();
                startGame();
            });

            peer.on('error', err => {
                alert("Error: " + err.type);
                document.getElementById('host-btn').style.display = 'block';
                document.getElementById('host-ui').style.display = 'none';
            });
        }

        // Player clicks "Join Game"
        function joinGame() {
            const roomId = document.getElementById('join-id').value.trim();
            if (roomId.length !== 5) return alert("Please enter a valid 5-digit code");
            
            updateStatus("Connecting...", "#eab308");
            
            // Joiner gets a random default ID, connects to Host's 5-digit ID
            peer = new Peer();
            
            peer.on('open', () => {
                connection = peer.connect(roomId);
                
                connection.on('open', () => {
                    setupConnection();
                    startGame();
                });

                connection.on('error', () => alert("Connection failed. Check the code."));
            });
        }

        function setupConnection() {
            isMultiplayer = true;
            updateStatus("Connected! Game On!", "#10b981"); // Green
            
            // Receive data from opponent
            connection.on('data', data => {
                if (data.type === 'gameState') {
                    drawRemoteBoard(data.matrix);
                    document.getElementById('remote-score').innerText = data.score;
                }
            });

            connection.on('close', () => {
                updateStatus("Opponent Disconnected", "#ef4444"); // Red
                gameRunning = false;
            });
        }

        // Send local game board and piece to opponent
        function sendGameState() {
            if (isMultiplayer && connection && connection.open) {
                // Combine frozen arena blocks with active falling piece
                const combinedMatrix = createMatrix(12, 20);
                for (let y = 0; y < arena.length; ++y) {
                    for (let x = 0; x < arena[y].length; ++x) {
                        combinedMatrix[y][x] = arena[y][x];
                    }
                }
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            if (combinedMatrix[y + player.pos.y] && combinedMatrix[y + player.pos.y][x + player.pos.x] !== undefined) {
                                combinedMatrix[y + player.pos.y][x + player.pos.x] = value;
                            }
                        }
                    });
                });

                connection.send({
                    type: 'gameState',
                    matrix: combinedMatrix,
                    score: player.score
                });
            }
        }

        function copyId() {
            navigator.clipboard.writeText(myShortId);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Code", 2000);
        }

        // --- TETRIS GAME LOGIC ---
        const canvas = document.getElementById('localCanvas');
        const context = canvas.getContext('2d');
        const remoteCanvas = document.getElementById('remoteCanvas');
        const remoteContext = remoteCanvas.getContext('2d');

        // Scale up by 20 to make a 12x20 grid fit into 240x400 canvas
        context.scale(20, 20);
        remoteContext.scale(20, 20);

        // Vibrant Tetris Colors
        const colors = [
            null,
            '#ef4444', // Red (Z)
            '#3b82f6', // Blue (J)
            '#10b981', // Green (S)
            '#a855f7', // Purple (T)
            '#f59e0b', // Orange (L)
            '#eab308', // Yellow (O)
            '#06b6d4'  // Cyan (I)
        ];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,7,0,0],[0,7,0,0],[0,7,0,0],[0,7,0,0]];
            if (type === 'L') return [[0,5,0],[0,5,0],[0,5,5]];
            if (type === 'J') return [[0,2,0],[0,2,0],[2,2,0]];
            if (type === 'O') return [[6,6],[6,6]];
            if (type === 'Z') return [[1,1,0],[0,1,1],[0,0,0]];
            if (type === 'S') return [[0,3,3],[3,3,0],[0,0,0]];
            if (type === 'T') return [[0,0,0],[4,4,4],[0,4,0]];
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // Add slight inner border for block effect
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 0.1); // top shading
                        ctx.fillRect(x + offset.x, y + offset.y, 0.1, 1); // left shading
                    }
                });
            });
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        function drawRemoteBoard(matrix) {
            remoteContext.fillStyle = '#000';
            remoteContext.fillRect(0, 0, remoteCanvas.width, remoteCanvas.height);
            drawMatrix(matrix, {x: 0, y: 0}, remoteContext);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
            sendGameState();
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) { player.pos.x -= offset; }
            sendGameState();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            sendGameState();
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) { matrix.forEach(row => row.reverse()); } 
            else { matrix.reverse(); }
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            // Game Over Condition
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
            sendGameState();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2; // Bonus for multiple lines
            }
            updateScore();
        }

        function updateScore() {
            document.getElementById('local-score').innerText = player.score;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameRunning = false;

        function update(time = 0) {
            if(!gameRunning) return;
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) { playerDrop(); }

            draw();
            requestAnimationFrame(update);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            playerReset();
            gameRunning = true;
            update();
        }

        // --- KEYBOARD CONTROLS ---
        document.addEventListener('keydown', event => {
            if(!gameRunning) return;
            
            if (event.keyCode === 37) { playerMove(-1); } // Left Arrow
            else if (event.keyCode === 39) { playerMove(1); } // Right Arrow
            else if (event.keyCode === 40) { playerDrop(); } // Down Arrow
            else if (event.keyCode === 38) { playerRotate(1); } // Up Arrow
            
            // Prevent window scrolling when playing
            if([37, 38, 39, 40].indexOf(event.keyCode) > -1) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
